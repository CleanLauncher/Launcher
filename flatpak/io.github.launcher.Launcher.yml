app-id: io.github.launcher.Launcher
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: launcher
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.portal.Desktop
  - --env=QT_QPA_PLATFORMTHEME=xdgdesktopportal
modules:
  - name: launcher
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
    sources:
      - type: dir
        path: ..
