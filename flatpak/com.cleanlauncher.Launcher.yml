app-id: com.cleanlauncher.Launcher
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: launcher
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --share=network
  - --device=dri
modules:
  - name: launcher
    buildsystem: cmake-ninja
    sources:
      - type: dir
        path: ..
