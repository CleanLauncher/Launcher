name: Package for macOS
description: Create a macOS package for Launcher

inputs:
  version:
    description: Launcher version
    required: true
  build-type:
    description: Type for the build
    required: true
    default: Debug
  artifact-name:
    description: Name of the uploaded artifact
    required: true
    default: macOS

runs:
  using: composite

  steps:
    - name: Package
      shell: bash
      env:
        BUILD_DIR: build
        INSTALL_DIR: install
      run: |
        cmake --install "$BUILD_DIR" --config "${{ inputs.build-type }}"

        cd "$INSTALL_DIR"
        chmod +x "Launcher.app/Contents/MacOS/launcher"
        sudo codesign --sign "-" --deep --force --options runtime "Launcher.app/Contents/MacOS/launcher"

    - name: Create DMG
      shell: bash
      env:
        INSTALL_DIR: install
      run: |
        cd "$INSTALL_DIR"

        mkdir -p src
        cp -R "Launcher.app" src/
        ln -s /Applications src/

        hdiutil create \
          -volname "Launcher ${{ inputs.version }}" \
          -srcfolder src \
          -ov -format ULMO \
          "../Launcher.dmg"

    - name: Create ZIP
      shell: bash
      env:
        INSTALL_DIR: install
      run: |
        cd "$INSTALL_DIR"
        ditto -c -k --sequesterRsrc --keepParent "Launcher.app" ../Launcher.zip

    - name: Upload binary tarball
      uses: actions/upload-artifact@v7
      with:
        name: Launcher-${{ inputs.artifact-name }}-${{ inputs.version }}-${{ inputs.build-type }}
        path: Launcher.zip

    - name: Upload disk image
      uses: actions/upload-artifact@v7
      with:
        name: Launcher-${{ inputs.artifact-name }}-${{ inputs.version }}-${{ inputs.build-type }}.dmg
        path: Launcher.dmg
