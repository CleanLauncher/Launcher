name: Package for Linux
description: Create Linux packages for Launcher

inputs:
  version:
    description: Launcher version
    required: true
  build-type:
    description: Type for the build
    required: true
    default: Debug
  artifact-name:
    description: Name of the uploaded artifact
    required: true
    default: Linux
  qt-version:
    description: Version of Qt used
    required: true

runs:
  using: composite

  steps:
    - name: Cleanup Qt installation
      shell: bash
      run: |
        rm -rf "$QT_PLUGIN_PATH"/printsupport
        rm -rf "$QT_PLUGIN_PATH"/sqldrivers
        rm -rf "$QT_PLUGIN_PATH"/help
        rm -rf "$QT_PLUGIN_PATH"/designer
        rm -rf "$QT_PLUGIN_PATH"/qmltooling
        rm -rf "$QT_PLUGIN_PATH"/qmlls
        rm -rf "$QT_PLUGIN_PATH"/qmllint
        rm -rf "$QT_PLUGIN_PATH"/platformthemes/libqgtk3.so

    - name: Setup build variables
      shell: bash
      run: |
        dpkg_arch="$(dpkg-architecture -q DEB_HOST_ARCH_CPU 2>/dev/null || true)"
        if [ -z "$dpkg_arch" ]; then
          dpkg_arch="$(uname -m)"
        fi
        case "$dpkg_arch" in
          "amd64"|"x86_64")  APPIMAGE_ARCH="x86_64";  DEB_ARCH="amd64";  RPM_ARCH="x86_64" ;;
          "arm64"|"aarch64") APPIMAGE_ARCH="aarch64"; DEB_ARCH="arm64";  RPM_ARCH="aarch64" ;;
          *) echo "::error::Unrecognized architecture: $dpkg_arch"; exit 1 ;;
        esac
        echo "APPIMAGE_ARCH=$APPIMAGE_ARCH" >> "$GITHUB_ENV"
        echo "DEB_ARCH=$DEB_ARCH" >> "$GITHUB_ENV"
        echo "RPM_ARCH=$RPM_ARCH" >> "$GITHUB_ENV"
        echo "DEB_HOST_MULTIARCH=$(dpkg-architecture -q DEB_HOST_MULTIARCH 2>/dev/null || true)" >> "$GITHUB_ENV"

    - name: Package AppImage
      shell: bash
      env:
        VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        BUILD_DIR: build
        INSTALL_APPIMAGE_DIR: install-appdir
      run: |
        cmake --install "$BUILD_DIR" --config "${{ inputs.build-type }}" --prefix "$INSTALL_APPIMAGE_DIR"

        cp "$BUILD_DIR/program_info/io.github.launcher.Launcher.desktop" "$INSTALL_APPIMAGE_DIR/"
        cp "${{ github.workspace }}/program_info/io.github.launcher.Launcher_256.png" "$INSTALL_APPIMAGE_DIR/io.github.launcher.Launcher.png"
        cp "${{ github.workspace }}/program_info/io.github.launcher.Launcher.svg" "$INSTALL_APPIMAGE_DIR/io.github.launcher.Launcher.svg"

        sharun lib4bin \
          --hard-links \
          --with-hooks \
          --dst-dir "$INSTALL_APPIMAGE_DIR" \
          "$INSTALL_APPIMAGE_DIR"/bin/* "$QT_PLUGIN_PATH"/*/*.so

        cp ~/bin/AppImageUpdate.AppImage "$INSTALL_APPIMAGE_DIR"/bin/
        find "$INSTALL_APPIMAGE_DIR" -name '*gamemode*' -exec rm {} +

        echo "LAUNCHER_DISABLE_GLVULKAN=1" >> "$INSTALL_APPIMAGE_DIR"/.env
        echo "QT_QPA_PLATFORMTHEME=xdgdesktopportal" >> "$INSTALL_APPIMAGE_DIR"/.env
        mv "$INSTALL_APPIMAGE_DIR"/{sharun,AppRun}

        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          APPIMAGE_DEST="Launcher-Linux-$APPIMAGE_ARCH.AppImage"
        else
          APPIMAGE_DEST="Launcher-Linux-$VERSION-${{ inputs.build-type }}-$APPIMAGE_ARCH.AppImage"
        fi

        mkappimage \
          --updateinformation "gh-releases-zsync|${{ github.repository_owner }}|${{ github.event.repository.name }}|latest|Launcher-Linux-$APPIMAGE_ARCH.AppImage.zsync" \
          "$INSTALL_APPIMAGE_DIR" \
          "$APPIMAGE_DEST"

    - name: Package .deb
      shell: bash
      env:
        VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        BUILD_DIR: build
        INSTALL_DEB_DIR: install-deb
      run: |
        cmake --install "$BUILD_DIR" --config "${{ inputs.build-type }}" --prefix "/opt/launcher"

        DEB_PKG="launcher_${VERSION}_${DEB_ARCH}.deb"
        mkdir -p "$INSTALL_DEB_DIR/DEBIAN"
        mkdir -p "$INSTALL_DEB_DIR/opt/launcher"
        cp -a /opt/launcher/* "$INSTALL_DEB_DIR/opt/launcher/"

        printf 'Package: launcher\n' > "$INSTALL_DEB_DIR/DEBIAN/control"
        printf 'Version: %s\n' "$VERSION" >> "$INSTALL_DEB_DIR/DEBIAN/control"
        printf 'Section: games\n' >> "$INSTALL_DEB_DIR/DEBIAN/control"
        printf 'Priority: optional\n' >> "$INSTALL_DEB_DIR/DEBIAN/control"
        printf 'Architecture: %s\n' "$DEB_ARCH" >> "$INSTALL_DEB_DIR/DEBIAN/control"
        printf 'Depends: libgl1-mesa-glx | libgl1, libglib2.0-0, libxcb-cursor0, libxcb1, libxkbcommon0\n' >> "$INSTALL_DEB_DIR/DEBIAN/control"
        printf 'Recommends: libgamemode0\n' >> "$INSTALL_DEB_DIR/DEBIAN/control"
        printf 'Maintainer: Clean Launcher Team <launcher@example.com>\n' >> "$INSTALL_DEB_DIR/DEBIAN/control"
        printf 'Description: Clean Launcher: Minecraft Launcher\n' >> "$INSTALL_DEB_DIR/DEBIAN/control"
        printf ' Clean and maintained Minecraft launcher.\n' >> "$INSTALL_DEB_DIR/DEBIAN/control"

        printf '#!/bin/bash\n' > "$INSTALL_DEB_DIR/DEBIAN/postinst"
        printf 'update-desktop-database /usr/share/applications 2>/dev/null || true\n' >> "$INSTALL_DEB_DIR/DEBIAN/postinst"
        printf 'update-mime-database /usr/share/mime 2>/dev/null || true\n' >> "$INSTALL_DEB_DIR/DEBIAN/postinst"
        chmod 755 "$INSTALL_DEB_DIR/DEBIAN/postinst"

        dpkg-deb --root-owner-group --build "$INSTALL_DEB_DIR" "$DEB_PKG"

    - name: Package .rpm
      shell: bash
      env:
        VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        BUILD_DIR: build
      run: |
        sudo apt-get -y install rpm

        RPM_SPEC="/tmp/launcher.spec"
        cat > "$RPM_SPEC" <<EOF
        Name:           launcher
        Version:        ${VERSION}
        Release:        1
        Summary:        Minecraft Launcher
        License:        GPL-3.0-only
        Group:          Amusements/Games
        URL:            https://github.com/CleanLauncher/Launcher
        Requires:       mesa-libGL glib2 libxcb libxkbcommon

        %description
        Clean and maintained Minecraft launcher.

        %install
        mkdir -p %{buildroot}/opt/launcher
        cp -a ${GITHUB_WORKSPACE}/build/install/* %{buildroot}/opt/launcher/

        %files
        /opt/launcher/*

        %post
        update-desktop-database /usr/share/applications 2>/dev/null || true
        EOF

        rpmbuild -bb "$RPM_SPEC" --define "_topdir /tmp/rpmbuild" \
          --define "version $VERSION" \
          --buildarch "$RPM_ARCH"

    - name: Package portable tarball
      shell: bash
      env:
        BUILD_DIR: build
        INSTALL_PORTABLE_DIR: install-portable
      run: |
        cmake --install "$BUILD_DIR" --config "${{ inputs.build-type }}" --prefix "$INSTALL_PORTABLE_DIR"
        cmake --install "$BUILD_DIR" --config "${{ inputs.build-type }}" --prefix "$INSTALL_PORTABLE_DIR" --component portable

        sharun lib4bin \
          --with-hooks \
          --hard-links \
          --dst-dir "$INSTALL_PORTABLE_DIR" \
          "$INSTALL_PORTABLE_DIR"/bin/* "$QT_PLUGIN_PATH"/*/*.so

        find "$INSTALL_PORTABLE_DIR" -name '*gamemode*' -exec rm {} +

        for l in $(find "$INSTALL_PORTABLE_DIR" -type f -o -type l); do
          l="${l#$(pwd)/}"
          l="${l#$INSTALL_PORTABLE_DIR/}"
          l="${l#./}"
          echo "$l"
        done > "$INSTALL_PORTABLE_DIR"/manifest.txt

        cd "$INSTALL_PORTABLE_DIR"
        tar -czf ../Launcher-portable.tar.gz *

    - name: Generate checksums
      shell: bash
      run: |
        for f in *.AppImage *.AppImage.zsync *.tar.gz *.deb /tmp/rpmbuild/RPMS/*/*.rpm; do
          [ -f "$f" ] || continue
          sha256sum "$f" > "$f.sha256"
          sha512sum "$f" > "$f.sha512"
        done

    - name: Upload binary tarball
      uses: actions/upload-artifact@v7
      with:
        name: Launcher-${{ inputs.artifact-name }}-Qt6-Portable-${{ inputs.version }}-${{ inputs.build-type }}
        path: Launcher-portable.tar.gz

    - name: Upload AppImage
      uses: actions/upload-artifact@v7
      with:
        name: Launcher-${{ runner.os }}-${{ inputs.version }}-${{ inputs.build-type }}-${{ env.APPIMAGE_ARCH }}.AppImage
        path: Launcher-Linux-*${{ env.APPIMAGE_ARCH }}.AppImage

    - name: Upload AppImage Zsync
      uses: actions/upload-artifact@v7
      with:
        name: Launcher-${{ runner.os }}-${{ inputs.version }}-${{ inputs.build-type }}-${{ env.APPIMAGE_ARCH }}.AppImage.zsync
        path: Launcher-Linux-*${{ env.APPIMAGE_ARCH }}.AppImage.zsync

    - name: Upload .deb
      uses: actions/upload-artifact@v7
      with:
        name: Launcher-${{ inputs.artifact-name }}-${{ inputs.version }}-${{ inputs.build-type }}.deb
        path: "*.deb"

    - name: Upload .rpm
      uses: actions/upload-artifact@v7
      with:
        name: Launcher-${{ inputs.artifact-name }}-${{ inputs.version }}-${{ inputs.build-type }}.rpm
        path: /tmp/rpmbuild/RPMS/*/*.rpm

    - name: Upload checksums
      uses: actions/upload-artifact@v7
      with:
        name: Launcher-${{ inputs.artifact-name }}-${{ inputs.version }}-${{ inputs.build-type }}-checksums
        path: "*.sha256"
