name: Setup Windows dependencies
description: Install and setup dependencies for building Launcher on Windows

inputs:
  build-type:
    description: Type for the build
    required: true
    default: Debug
  msystem:
    description: MSYS2 subsystem to use
    required: false
  vcvars-arch:
    description: Visual Studio architecture to use
    required: true
    default: amd64

runs:
  using: composite

  steps:
    - name: Enter VS Developer shell (MSVC)
      if: ${{ inputs.msystem == '' }}
      shell: pwsh
      run: |
        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
        $vcvarsall = Join-Path $installPath "VC\Auxiliary\Build\vcvarsall.bat"
        cmd /c "`"$vcvarsall`" ${{ inputs.vcvars-arch }} && set" | ForEach-Object {
          if ($_ -match "^(.+?)=(.*)$") {
            [System.Environment]::SetEnvironmentVariable($matches[1], $matches[2], "Process")
            "$($matches[1])=$($matches[2])" | Out-File -Append $env:GITHUB_ENV
          }
        }

    - name: Setup Java (MSVC)
      if: ${{ inputs.msystem == '' }}
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: 17

    - name: Setup vcpkg environment (MSVC)
      if: ${{ inputs.msystem == '' }}
      shell: bash
      run: |
        echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

    - name: Setup MSYS2 (MinGW)
      if: ${{ inputs.msystem != '' }}
      shell: bash
      env:
        MSYSTEM: ${{ inputs.msystem }}
      run: |
        echo "C:\msys64\usr\bin" >> "$GITHUB_PATH"

        MSYS_INPUT="${{ inputs.msystem }}"
        MSYS_INPUT="$(printf '%s' "$MSYS_INPUT" | tr -d '[:space:]')"

        case "$MSYS_INPUT" in
          CLANG64)    PKG_PREFIX="mingw-w64-clang-x86_64" ;;
          CLANGARM64) PKG_PREFIX="mingw-w64-clang-aarch64" ;;
          MINGW64)    PKG_PREFIX="mingw-w64-x86_64" ;;
          UCRT64)     PKG_PREFIX="mingw-w64-ucrt-x86_64" ;;
          *)          echo "::error::Unknown msystem: ${{ inputs.msystem }}"; exit 1 ;;
        esac

        echo "PKG_PREFIX=$PKG_PREFIX" >> "$GITHUB_ENV"

        C:\msys64\usr\bin\bash.exe -lc "pacman -Syu --noconfirm"

        C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm \
          $PKG_PREFIX-toolchain \
          $PKG_PREFIX-ccache \
          $PKG_PREFIX-cmake \
          $PKG_PREFIX-extra-cmake-modules \
          $PKG_PREFIX-ninja \
          $PKG_PREFIX-qt6-base \
          $PKG_PREFIX-qt6-svg \
          $PKG_PREFIX-qt6-imageformats \
          $PKG_PREFIX-qt6-networkauth \
          $PKG_PREFIX-cmark \
          $PKG_PREFIX-qrencode \
          $PKG_PREFIX-tomlplusplus \
          $PKG_PREFIX-libarchive"

    - name: List pacman packages (MinGW)
      if: ${{ inputs.msystem != '' }}
      shell: bash
      run: |
        C:\msys64\usr\bin\bash.exe -lc "pacman -Qe"

    - name: Retrieve ccache cache (MinGW)
      if: ${{ inputs.msystem != '' && inputs.build-type == 'Debug' }}
      uses: actions/cache@v5
      with:
        path: '${{ github.workspace }}\.ccache'
        key: ${{ runner.os }}-${{ inputs.msystem }}-ccache-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.msystem }}-ccache

    - name: Setup ccache (MinGW)
      if: ${{ inputs.msystem != '' && inputs.build-type == 'Debug' }}
      shell: bash
      run: |
        C:\msys64\usr\bin\bash.exe -lc "
          ccache --set-config=cache_dir='${{ github.workspace }}/.ccache'
          ccache --set-config=max_size='500M'
          ccache --set-config=compression=true
          ccache -p
        "
