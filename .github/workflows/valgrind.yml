name: Valgrind

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "master"
      - "develop"
      - "release-*"
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  valgrind:
    name: Memory leak check

    permissions:
      contents: read

    runs-on: ubuntu-24.04

    env:
      BUILD_TYPE: Debug
      CMAKE_PRESET: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          build-type: ${{ env.BUILD_TYPE }}
          artifact-name: Linux
          qt-version: 6.10.2

      - name: Install Valgrind
        run: |
          sudo apt-get -y update
          sudo apt-get -y install valgrind

      - name: Configure project
        run: |
          cmake --preset "$CMAKE_PRESET" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-g -O0 -fno-omit-frame-pointer -fstack-protector-all -D_FORTIFY_SOURCE=2" \
            -DCMAKE_CXX_FLAGS="-g -O0 -fno-omit-frame-pointer -fstack-protector-all -D_FORTIFY_SOURCE=2 -D_GLIBCXX_DEBUG -D_GLIBCXX_DEBUG_PEDANTIC"

      - name: Build
        run: |
          cmake --build --preset "$CMAKE_PRESET" --config "$BUILD_TYPE"

      - name: Run tests under Valgrind (strictest)
        run: |
          valgrind --tool=memcheck \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --error-exitcode=1 \
            --xml=yes \
            --xml-file=valgrind-report.xml \
            --keep-stacktraces=alloc-and-free \
            --num-callers=100 \
            --track-fds=yes \
            --trace-children=yes \
            --fair-sched=yes \
            --child-silent-after-fork=no \
            --time-unit=instructions \
            --max-stackframe=4194304 \
            --main-stacksize=16777216 \
            --redo-last-malloc=no \
            --show-reachable=yes \
            --show-mismatched-frees=yes \
            --inline-alloc=yes \
            --auto=yes \
            --expensive-definedness-checks=yes \
            --partial-loads-ok=no \
            --merge-recursive-frames=no \
            --delta-stacktrace=yes \
            --history-level=full \
            --sim-hints=no-nptl-pthread-stackcache \
            --cleanup-default=yes \
            --expansion=1 \
            --initial-heap-size=16777216 \
            --freelist-vol=10000000 \
            --alignment=16 \
            --malloc-fill=DEADBEEF \
            --free-fill=FEADBEEF \
            ctest --preset "$CMAKE_PRESET" --build-config "$BUILD_TYPE" --output-on-failure

          # Print human-readable summary
          if [ -f valgrind-report.xml ]; then
            echo "## Valgrind Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```xml' >> "$GITHUB_STEP_SUMMARY"
            grep -E "(error|leak|summary)" valgrind-report.xml | head -50 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          # Check for actual errors (not just leaks)
          if grep -q 'exit="0"' valgrind-report.xml 2>/dev/null; then
            echo "Valgrind: no errors detected."
          else
            echo "::warning::Valgrind detected memory errors (see report)"
          fi

      - name: Upload Valgrind report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: valgrind-report
          path: valgrind-report.xml
          retention-days: 30

  address-sanitizer:
    name: Address Sanitizer

    permissions:
      contents: read

    runs-on: ubuntu-24.04

    env:
      BUILD_TYPE: Debug
      CMAKE_PRESET: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          build-type: ${{ env.BUILD_TYPE }}
          artifact-name: Linux
          qt-version: 6.10.2

      - name: Configure project
        run: |
          cmake --preset "$CMAKE_PRESET" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-g -O0 -fsanitize=address,undefined -fno-omit-frame-pointer -fstack-protector-all -D_FORTIFY_SOURCE=2" \
            -DCMAKE_CXX_FLAGS="-g -O0 -fsanitize=address,undefined -fno-omit-frame-pointer -fstack-protector-all -D_FORTIFY_SOURCE=2 -D_GLIBCXX_DEBUG -D_GLIBCXX_DEBUG_PEDANTIC" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: |
          cmake --build --preset "$CMAKE_PRESET" --config "$BUILD_TYPE"

      - name: Run tests under Address Sanitizer
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=0:print_stats=1:check_initialization_order=1:detect_stack_use_after_return=1:alloc_dealloc_mismatch=1:odr_violation=2:strict_string_checks=1:check_shadow=1:shadow_length=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=0:ubsan_print_options=1:check_undefined=1:undefined_behavior_panic=0:print_undefined=1
        run: |
          ctest --preset "$CMAKE_PRESET" --build-config "$BUILD_TYPE" --output-on-failure 2>&1 | tee sanitizer-output.txt

          # Check for sanitizer errors
          if grep -q "ERROR:" sanitizer-output.txt 2>/dev/null; then
            echo "::error::Address Sanitizer detected errors"
            grep "ERROR:" sanitizer-output.txt | head -20
            exit 1
          fi

          if grep -q "SUMMARY:" sanitizer-output.txt 2>/dev/null; then
            echo "## Address Sanitizer Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -A 20 "SUMMARY:" sanitizer-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "Address Sanitizer: no errors detected."

      - name: Upload sanitizer output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: address-sanitizer-output
          path: sanitizer-output.txt
          retention-days: 30

  undefined-sanitizer:
    name: Undefined Behavior Sanitizer

    permissions:
      contents: read

    runs-on: ubuntu-24.04

    env:
      BUILD_TYPE: Debug
      CMAKE_PRESET: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          build-type: ${{ env.BUILD_TYPE }}
          artifact-name: Linux
          qt-version: 6.10.2

      - name: Configure project
        run: |
          cmake --preset "$CMAKE_PRESET" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-g -O0 -fsanitize=undefined -fno-omit-frame-pointer -fstack-protector-all -D_FORTIFY_SOURCE=2 -fno-sanitize-recover=all" \
            -DCMAKE_CXX_FLAGS="-g -O0 -fsanitize=undefined -fno-omit-frame-pointer -fstack-protector-all -D_FORTIFY_SOURCE=2 -D_GLIBCXX_DEBUG -D_GLIBCXX_DEBUG_PEDANTIC -fno-sanitize-recover=all" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=undefined" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=undefined"

      - name: Build
        run: |
          cmake --build --preset "$CMAKE_PRESET" --config "$BUILD_TYPE"

      - name: Run tests under Undefined Behavior Sanitizer
        env:
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1:ubsan_print_options=1:check_undefined=1:undefined_behavior_panic=1:print_undefined=1:halt_on_error=1
        run: |
          ctest --preset "$CMAKE_PRESET" --build-config "$BUILD_TYPE" --output-on-failure 2>&1 | tee ubsan-output.txt

          # Check for UBSan errors
          if grep -q "runtime error" ubsan-output.txt 2>/dev/null; then
            echo "::error::Undefined Behavior Sanitizer detected errors"
            grep "runtime error" ubsan-output.txt | head -20
            exit 1
          fi

          echo "Undefined Behavior Sanitizer: no errors detected."

      - name: Upload UBSan output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: undefined-sanitizer-output
          path: ubsan-output.txt
          retention-days: 30

  thread-sanitizer:
    name: Thread Sanitizer

    permissions:
      contents: read

    runs-on: ubuntu-24.04

    env:
      BUILD_TYPE: Debug
      CMAKE_PRESET: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          build-type: ${{ env.BUILD_TYPE }}
          artifact-name: Linux
          qt-version: 6.10.2

      - name: Configure project
        run: |
          cmake --preset "$CMAKE_PRESET" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-g -O0 -fsanitize=thread -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O0 -fsanitize=thread -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=thread"

      - name: Build
        run: |
          cmake --build --preset "$CMAKE_PRESET" --config "$BUILD_TYPE"

      - name: Run tests under Thread Sanitizer
        env:
          TSAN_OPTIONS: halt_on_error=0:print_stacktrace=1:second_deadlock_stack=1:history_size=7:check_missing_unlock=1:print_suppressions=0
        run: |
          ctest --preset "$CMAKE_PRESET" --build-config "$BUILD_TYPE" --output-on-failure 2>&1 | tee tsan-output.txt

          # Check for TSan errors
          if grep -q "WARNING: ThreadSanitizer" tsan-output.txt 2>/dev/null; then
            echo "::warning::Thread Sanitizer detected potential issues"
            grep "WARNING:" tsan-output.txt | head -20
          fi

          echo "Thread Sanitizer: completed."

      - name: Upload TSan output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: thread-sanitizer-output
          path: tsan-output.txt
          retention-days: 30

  memory-sanitizer:
    name: Memory Sanitizer

    permissions:
      contents: read

    runs-on: ubuntu-24.04

    env:
      BUILD_TYPE: Debug
      CMAKE_PRESET: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          build-type: ${{ env.BUILD_TYPE }}
          artifact-name: Linux
          qt-version: 6.10.2

      - name: Configure project
        run: |
          cmake --preset "$CMAKE_PRESET" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-g -O0 -fsanitize=memory -fno-omit-frame-pointer -fsanitize-memory-track-origins" \
            -DCMAKE_CXX_FLAGS="-g -O0 -fsanitize=memory -fno-omit-frame-pointer -fsanitize-memory-track-origins" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=memory" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=memory"

      - name: Build
        run: |
          cmake --build --preset "$CMAKE_PRESET" --config "$BUILD_TYPE"

      - name: Run tests under Memory Sanitizer
        env:
          MSAN_OPTIONS: halt_on_error=0:print_stacktrace=1:wrap_env=1
        run: |
          ctest --preset "$CMAKE_PRESET" --build-config "$BUILD_TYPE" --output-on-failure 2>&1 | tee msan-output.txt

          # Check for MSan errors
          if grep -q "WARNING: MemorySanitizer" msan-output.txt 2>/dev/null; then
            echo "::warning::Memory Sanitizer detected uninitialized memory usage"
            grep "WARNING:" msan-output.txt | head -20
          fi

          echo "Memory Sanitizer: completed."

      - name: Upload MSan output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: memory-sanitizer-output
          path: msan-output.txt
          retention-days: 30
