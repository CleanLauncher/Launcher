name: Valgrind

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "master"
      - "develop"
      - "release-*"
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  valgrind:
    name: Memory leak check

    permissions:
      contents: read

    runs-on: ubuntu-24.04

    env:
      BUILD_TYPE: Debug
      CMAKE_PRESET: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          build-type: ${{ env.BUILD_TYPE }}
          artifact-name: Linux
          qt-version: 6.10.2

      - name: Install Valgrind
        run: |
          sudo apt-get -y update
          sudo apt-get -y install valgrind

      - name: Configure project
        run: |
          cmake --preset "$CMAKE_PRESET" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-g -O0 -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-g -O0 -fno-omit-frame-pointer"

      - name: Build
        run: |
          cmake --build --preset "$CMAKE_PRESET" --config "$BUILD_TYPE"

      - name: Run tests under Valgrind
        run: |
          valgrind --tool=memcheck \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=all \
            --track-origins=yes \
            --error-exitcode=1 \
            --xml=yes \
            --xml-file=valgrind-report.xml \
            --keep-stacktraces=alloc-and-free \
            --num-callers=50 \
            --track-fds=yes \
            --trace-children=yes \
            --fair-sched=yes \
            --child-silent-after-fork=no \
            --time-unit=instructions \
            --max-stackframe=1048576 \
            --main-stacksize=8388608 \
            --redo-last-malloc=no \
            --show-reachable=yes \
            --show-mismatched-frees=yes \
            --inline-alloc=yes \
            --auto=yes \
            ctest --preset "$CMAKE_PRESET" --build-config "$BUILD_TYPE" --output-on-failure

          # Print human-readable summary
          if [ -f valgrind-report.xml ]; then
            echo "## Valgrind Summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```xml' >> "$GITHUB_STEP_SUMMARY"
            grep -E "(error|leak|summary)" valgrind-report.xml | head -50 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

          # Check for actual errors (not just leaks)
          if grep -q 'exit="0"' valgrind-report.xml 2>/dev/null; then
            echo "Valgrind: no errors detected."
          else
            echo "::warning::Valgrind detected memory errors (see report)"
          fi

      - name: Upload Valgrind report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: valgrind-report
          path: valgrind-report.xml
          retention-days: 30
