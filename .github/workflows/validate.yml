name: Validate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "master"
      - "develop"
      - "release-*"
  pull_request:

permissions: {}

jobs:
  signoff:
    name: Signed-off-by check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify all commits are signed off
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD | tail -1)
          fi
          FAILED=0
          while IFS= read -r hash; do
            MSG=$(git log -1 --format='%B' "$hash")
            if ! echo "$MSG" | grep -q "^Signed-off-by:"; then
              echo "::error file=.git commit=$hash::Missing Signed-off-by"
              git log -1 --format='  %h %s' "$hash"
              FAILED=1
            fi
          done < <(git rev-list "$BASE"..HEAD)
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commits must include a Signed-off-by line."
            echo "Use: git commit -s"
            exit 1
          fi
          echo "All commits are properly signed off."

  signoff-author:
    name: Signed-off-by matches author
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by matches commit author
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE=$(git rev-list --max-parents=0 HEAD | tail -1)
          fi
          FAILED=0
          while IFS= read -r hash; do
            AUTHOR_NAME=$(git log -1 --format='%an' "$hash")
            AUTHOR_EMAIL=$(git log -1 --format='%ae' "$hash")
            SO_LINE=$(git log -1 --format='%B' "$hash" | grep "^Signed-off-by:" | head -1)
            if [ -z "$SO_LINE" ]; then
              continue
            fi
            SO_NAME=$(echo "$SO_LINE" | sed 's/Signed-off-by: \(.*\) <.*/\1/')
            SO_EMAIL=$(echo "$SO_LINE" | sed 's/.*<\(.*\)>/\1/')
            if [ "$SO_NAME" != "$AUTHOR_NAME" ] || [ "$SO_EMAIL" != "$AUTHOR_EMAIL" ]; then
              echo "::error file=.git commit=$hash::Signed-off-by ($SO_NAME <$SO_EMAIL>) does not match author ($AUTHOR_NAME <$AUTHOR_EMAIL>)"
              git log -1 --format='  %h %s' "$hash"
              FAILED=1
            fi
          done < <(git rev-list "$BASE"..HEAD)
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Signed-off-by must match the commit author."
            exit 1
          fi
          echo "All Signed-off-by lines match their commit authors."

  no-emoji:
    name: No emoji check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for emojis in source and docs
        run: |
          FAILED=0
          while IFS= read -r file; do
            MATCHES=$(grep -Pn '[\x{1F300}-\x{1F9FF}\x{2600}-\x{26FF}\x{2700}-\x{27BF}\x{FE00}-\x{FE0F}\x{1F000}-\x{1FFFF}]' "$file" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::error file=$file::Emoji found"
              echo "$MATCHES"
              FAILED=1
            fi
          done < <(find . -name '*.cpp' -o -name '*.h' -o -name '*.hpp' -o -name '*.md' -o -name '*.yml' -o -name '*.yaml' -o -name '*.java' | grep -v './.git/' | grep -v './build/' | grep -v './libraries/')
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Emojis are not allowed in source code, documentation, or CI files."
            exit 1
          fi
          echo "No emojis found."

  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install codespell
        run: |
          pip install --break-system-packages codespell

      - name: Run codespell
        run: |
          codespell --skip='./libraries,./build,./.git,./.mimocode,*.lock,*.json' \
            --ignore-words-list='te,nd,ist,parm,ore,orelse,ue,se,fo,lo,co' \
            --quiet-level=2

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yamllint
        run: |
          pip install --break-system-packages yamllint

      - name: Run yamllint
        run: |
          yamllint -c <(cat <<'YAML'
          extends: default
          rules:
            line-length:
              max: 200
            truthy:
              check-keys: false
            comments:
              min-spaces-from-content: 1
            document-start: disable
          YAML
          ) .github/workflows/*.yml .github/actions/**/*.yml

  license-header:
    name: License header check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify SPDX license headers
        run: |
          FAILED=0
          while IFS= read -r file; do
            if ! grep -q "SPDX-License-Identifier" "$file" 2>/dev/null; then
              echo "::warning file=$file::Missing SPDX license header"
              FAILED=1
            fi
          done < <(find launcher/ libraries/ -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | grep -v './libraries/libnbtplusplus/')
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Some source files are missing SPDX license headers."
            echo "Add: // SPDX-License-Identifier: GPL-3.0-only"
          fi
          echo "License header check completed."
