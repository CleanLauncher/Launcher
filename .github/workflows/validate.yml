name: Validate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "master"
      - "develop"
      - "release-*"
  pull_request:

permissions: {}

jobs:
  signoff:
    name: Signed-off-by check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify all commits are signed off
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HASHES=$(git rev-list "$BASE"..HEAD 2>/dev/null)
          else
            HASHES=$(git log -20 --format='%H' HEAD)
          fi

          FAILED=0
          COUNT=0
          while IFS= read -r hash; do
            [ -z "$hash" ] && continue
            COUNT=$((COUNT + 1))
            MSG=$(git log -1 --format='%B' "$hash")
            if ! echo "$MSG" | grep -q "^Signed-off-by:"; then
              echo "::error file=.git commit=$hash::Missing Signed-off-by"
              git log -1 --format='  %h %an <%ae> %s' "$hash"
              FAILED=1
            fi
          done <<< "$HASHES"

          echo "Checked $COUNT commits."
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commits must include a Signed-off-by line. Use: git commit -s"
            exit 1
          fi
          echo "All commits are properly signed off."

  commit-format:
    name: Commit message format
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify commit message is exactly one line + signoff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HASHES=$(git rev-list "$BASE"..HEAD 2>/dev/null)
          else
            HASHES=$(git log -20 --format='%H' HEAD)
          fi

          FAILED=0
          COUNT=0
          while IFS= read -r hash; do
            [ -z "$hash" ] && continue
            PARENTS=$(git cat-file -p "$hash" | grep -c '^parent ')
            if [ "$PARENTS" -gt 1 ]; then
              continue
            fi
            AUTHOR=$(git log -1 --format='%an' "$hash")
            if echo "$AUTHOR" | grep -qi 'bot\|dependabot\|renovate'; then
              continue
            fi
            COUNT=$((COUNT + 1))
            BODY=$(git log -1 --format='%B' "$hash")
            LINE_COUNT=$(echo "$BODY" | grep -c '^')
            if [ "$LINE_COUNT" -ne 3 ]; then
              echo "::error file=.git commit=$hash::Commit message must be exactly one line + blank line + Signed-off-by (got $LINE_COUNT lines)"
              git log -1 --format='  %h %s' "$hash"
              FAILED=1
            fi
          done <<< "$HASHES"

          echo "Checked $COUNT commits."
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Format: <subject line> + blank line + Signed-off-by: ..."
            echo "Use: git commit -s -m 'type: short description'"
            exit 1
          fi
          echo "All commits follow the format."

  no-emoji:
    name: No emoji check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check for emojis
        run: |
          FAILED=0
          while IFS= read -r file; do
            MATCHES=$(perl -ne 'print "$.: $_" if /[\x{1F300}-\x{1F9FF}\x{2600}-\x{26FF}\x{2700}-\x{27BF}]/' "$file" 2>/dev/null)
            if [ -n "$MATCHES" ]; then
              echo "::error file=$file::Emoji found"
              echo "$MATCHES" | head -3
              FAILED=1
            fi
          done < <(find . \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' -o -name '*.md' -o -name '*.yml' -o -name '*.yaml' -o -name '*.java' \) \
            -not -path './.git/*' -not -path './build/*' -not -path './libraries/*' -not -path './.mimocode/*')
          if [ "$FAILED" -eq 1 ]; then
            echo "Emojis are not allowed."
            exit 1
          fi
          echo "No emojis found."

  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install codespell
        run: pip install --break-system-packages codespell

      - name: Run codespell
        run: |
          codespell --skip='./libraries,./build,./.git,./.mimocode,./crates/target,./docs,*.lock,*.json,*.nix,*.ui,./tests/testdata,./src/resources,./cmake,./scripts,./res' \
            --ignore-words .codespell-ignore-words \
            --quiet-level=2

  semantic-variables:
    name: Semantic variables
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check for non-semantic variable names in shell scripts
        run: |
          FAILED=0
          NONSEMANTIC_VARIABLES="(^|[^a-zA-Z0-9_])(data|result|buf|s|tmp|temp|str|val|x|y|z|i|j|k|n|e|r|t|d|dir|dirname|f|fn|ret|err|msg|cmd|args|opts|param|list|arr|item|elem|node|parent|child|sibling|next|prev|head|tail|src|dst|input|output|path|name|type|kind|id|key|value|index|count|size|len|length|width|height|depth|min|max|sum|avg|mean|total|count|num|flag|debug|verbose|quiet|silent|force|dry|help|version|usage)([^a-zA-Z0-9_]|$)"
          while IFS= read -r file; do
            if grep -nE "$NONSEMANTIC_VARIABLES" "$file" 2>/dev/null; then
              while IFS=: read -r line_number line_content; do
                if echo "$line_content" | grep -qvE '^\s*#' && echo "$line_content" | grep -qE "$NONSEMANTIC_VARIABLES"; then
                  echo "::error file=$file,line=$line_number::Non-semantic variable name found: $line_content"
                  FAILED=1
                fi
              done < <(grep -nE "$NONSEMANTIC_VARIABLES" "$file" 2>/dev/null)
            fi
          done < <(find . -name "*.sh" -o -name "*.yml" -o -name "*.yaml" | grep -v '.git/' | grep -v 'build/' | grep -v '.mimocode/' | grep -v 'libraries/' | grep -v 'crates/')
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Variable names must be semantic (AGENTS.md rule)."
            echo "Examples: compressed_data, output_buffer, file_size_human"
            echo "Forbidden: data, result, buf, s, tmp, dir, dirname, f, etc."
            exit 1
          fi
          echo "All variable names are semantic."

      - name: Check for non-semantic function names in shell scripts
        run: |
          FAILED=0
          NONSEMANTIC_FUNCTIONS="^function (run|get|set|process|handle|check|do|make|create|delete|remove|add|update|modify|change|test|verify|validate|init|setup|teardown|cleanup|start|stop|pause|resume|enable|disable|open|close|read|write|send|receive|fetch|load|save|parse|encode|decode|convert|transform|format|print|log|debug|warn|error|info|fatal|trace|assert|expect|should|must|can|may|will|shall) "
          while IFS= read -r file; do
            if grep -nE "$NONSEMANTIC_FUNCTIONS" "$file" 2>/dev/null; then
              while IFS=: read -r line_number line_content; do
                if echo "$line_content" | grep -qE "$NONSEMANTIC_FUNCTIONS"; then
                  echo "::error file=$file,line=$line_number::Non-semantic function name found: $line_content"
                  FAILED=1
                fi
              done < <(grep -nE "$NONSEMANTIC_FUNCTIONS" "$file" 2>/dev/null)
            fi
          done < <(find . -name "*.sh" | grep -v '.git/' | grep -v 'build/' | grep -v '.mimocode/' | grep -v 'libraries/' | grep -v 'crates/')
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Function names must be semantic (AGENTS.md rule)."
            echo "Use descriptive names like: process_file_content, validate_user_input"
            exit 1
          fi
          echo "All function names are semantic."

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install yamllint
        run: pip install --break-system-packages yamllint

      - name: Run yamllint
        run: |
          yamllint -c <(cat <<'YAML'
          extends: default
          rules:
            line-length:
              max: 500
            truthy:
              check-keys: false
            comments:
              min-spaces-from-content: 1
            document-start: disable
            brackets:
              min-spaces-inside: 0
              max-spaces-inside: 1
          YAML
          ) .github/workflows/*.yml .github/actions/**/*.yml
