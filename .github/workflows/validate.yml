name: Validate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "master"
      - "develop"
      - "release-*"
  pull_request:

permissions: {}

jobs:
  signoff:
    name: Signed-off-by check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify all commits are signed off
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HASHES=$(git rev-list "$BASE"..HEAD 2>/dev/null)
          else
            # For push events, check last 20 commits only
            HASHES=$(git log -20 --format='%H' HEAD)
          fi

          FAILED=0
          COUNT=0
          while IFS= read -r hash; do
            [ -z "$hash" ] && continue
            COUNT=$((COUNT + 1))
            MSG=$(git log -1 --format='%B' "$hash")
            if ! echo "$MSG" | grep -q "^Signed-off-by:"; then
              echo "::error file=.git commit=$hash::Missing Signed-off-by"
              git log -1 --format='  %h %an <%ae> %s' "$hash"
              FAILED=1
            fi
          done <<< "$HASHES"

          echo "Checked $COUNT commits."
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commits must include a Signed-off-by line. Use: git commit -s"
            exit 1
          fi
          echo "All commits are properly signed off."

  no-emoji:
    name: No emoji check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for emojis
        run: |
          FAILED=0
          while IFS= read -r file; do
            MATCHES=$(perl -ne 'print "$.: $_" if /[\x{1F300}-\x{1F9FF}\x{2600}-\x{26FF}\x{2700}-\x{27BF}]/' "$file" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::error file=$file::Emoji found"
              echo "$MATCHES" | head -3
              FAILED=1
            fi
          done < <(find . \( -name '*.cpp' -o -name '*.h' -o -name '*.hpp' -o -name '*.md' -o -name '*.yml' -o -name '*.yaml' -o -name '*.java' \) \
            -not -path './.git/*' -not -path './build/*' -not -path './libraries/*' -not -path './.mimocode/*')
          if [ "$FAILED" -eq 1 ]; then
            echo "Emojis are not allowed."
            exit 1
          fi
          echo "No emojis found."

  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install codespell
        run: pip install --break-system-packages codespell

      - name: Run codespell
        run: |
          codespell --skip='./libraries,./build,./.git,./.mimocode,*.lock,*.json,*.nix' \
            --ignore-words .codespell-ignore-words \
            --quiet-level=2

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install --break-system-packages yamllint

      - name: Run yamllint
        run: |
          yamllint -c <(cat <<'YAML'
          extends: default
          rules:
            line-length:
              max: 500
            truthy:
              check-keys: false
            comments:
              min-spaces-from-content: 1
            document-start: disable
            brackets:
              min-spaces-inside: 0
              max-spaces-inside: 1
          YAML
          ) .github/workflows/*.yml .github/actions/**/*.yml
