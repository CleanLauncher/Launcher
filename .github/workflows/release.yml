name: Build Application and Make Release

on:
  push:
    tags:
      - "*"

permissions: {}

jobs:
  build_release:
    name: Build Release
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
    with:
      build-type: Release
    secrets: inherit

  create_release:
    needs: build_release
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: "true"
          path: "CleanLauncher-source"

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Grab and store version
        run: |
          tag_name=$(echo ${{ github.ref }} | grep -oE "[^/]+$")
          echo "VERSION=$tag_name" >> $GITHUB_ENV

      - name: Package artifacts properly
        run: |
          mv ${{ github.workspace }}/CleanLauncher-source CleanLauncher-${{ env.VERSION }}
          mv CleanLauncher-Linux-Qt6-Portable*/CleanLauncher-portable.tar.gz CleanLauncher-Linux-Qt6-Portable-${{ env.VERSION }}.tar.gz
          mv CleanLauncher-Linux-aarch64-Qt6-Portable*/CleanLauncher-portable.tar.gz CleanLauncher-Linux-aarch64-Qt6-Portable-${{ env.VERSION }}.tar.gz
          mv CleanLauncher-*.AppImage/CleanLauncher-*-x86_64.AppImage CleanLauncher-Linux-x86_64.AppImage
          mv CleanLauncher-*.AppImage.zsync/CleanLauncher-*-x86_64.AppImage.zsync CleanLauncher-Linux-x86_64.AppImage.zsync
          mv CleanLauncher-*.AppImage/CleanLauncher-*-aarch64.AppImage CleanLauncher-Linux-aarch64.AppImage
          mv CleanLauncher-*.AppImage.zsync/CleanLauncher-*-aarch64.AppImage.zsync CleanLauncher-Linux-aarch64.AppImage.zsync
          mv CleanLauncher-macOS*/CleanLauncher.zip CleanLauncher-macOS-${{ env.VERSION }}.zip
          mv CleanLauncher-macOS*/CleanLauncher.dmg CleanLauncher-macOS-${{ env.VERSION }}.dmg

          tar --exclude='.git' -czf CleanLauncher-${{ env.VERSION }}.tar.gz CleanLauncher-${{ env.VERSION }}

          for d in CleanLauncher-Windows-MSVC*; do
            cd "${d}" || continue
            ARM64="$(echo -n ${d} | grep -o arm64 || true)"
            INST="$(echo -n ${d} | grep -o Setup || true)"
            PORT="$(echo -n ${d} | grep -o Portable || true)"
            NAME="CleanLauncher-Windows-MSVC"
            test -z "${ARM64}" || NAME="${NAME}-arm64"
            test -z "${PORT}" || NAME="${NAME}-Portable"
            test -z "${INST}" || mv CleanLauncher-*.exe ../${NAME}-Setup-${{ env.VERSION }}.exe
            test -n "${INST}" || zip -r -9 "../${NAME}-${{ env.VERSION }}.zip" *
            cd ..
          done

          for d in CleanLauncher-Windows-MinGW-w64*; do
            cd "${d}" || continue
            INST="$(echo -n ${d} | grep -o Setup || true)"
            PORT="$(echo -n ${d} | grep -o Portable || true)"
            NAME="CleanLauncher-Windows-MinGW-w64"
            test -z "${PORT}" || NAME="${NAME}-Portable"
            test -z "${INST}" || mv CleanLauncher-*.exe ../${NAME}-Setup-${{ env.VERSION }}.exe
            test -n "${INST}" || zip -r -9 "../${NAME}-${{ env.VERSION }}.zip" *
            cd ..
          done

          for d in CleanLauncher-Windows-MinGW-arm64*; do
            cd "${d}" || continue
            INST="$(echo -n ${d} | grep -o Setup || true)"
            PORT="$(echo -n ${d} | grep -o Portable || true)"
            NAME="CleanLauncher-Windows-MinGW-arm64"
            test -z "${PORT}" || NAME="${NAME}-Portable"
            test -z "${INST}" || mv CleanLauncher-*.exe ../${NAME}-Setup-${{ env.VERSION }}.exe
            test -n "${INST}" || zip -r -9 "../${NAME}-${{ env.VERSION }}.zip" *
            cd ..
          done

      - name: Create release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "CleanLauncher ${{ env.VERSION }}" \
            --draft \
            --generate-notes \
            CleanLauncher-Linux-x86_64.AppImage \
            CleanLauncher-Linux-x86_64.AppImage.zsync \
            CleanLauncher-Linux-aarch64.AppImage \
            CleanLauncher-Linux-aarch64.AppImage.zsync \
            "CleanLauncher-Linux-Qt6-Portable-${{ env.VERSION }}.tar.gz" \
            "CleanLauncher-Linux-aarch64-Qt6-Portable-${{ env.VERSION }}.tar.gz" \
            "CleanLauncher-Windows-MinGW-w64-${{ env.VERSION }}.zip" \
            "CleanLauncher-Windows-MinGW-w64-Portable-${{ env.VERSION }}.zip" \
            "CleanLauncher-Windows-MinGW-w64-Setup-${{ env.VERSION }}.exe" \
            "CleanLauncher-Windows-MinGW-arm64-${{ env.VERSION }}.zip" \
            "CleanLauncher-Windows-MinGW-arm64-Portable-${{ env.VERSION }}.zip" \
            "CleanLauncher-Windows-MinGW-arm64-Setup-${{ env.VERSION }}.exe" \
            "CleanLauncher-Windows-MSVC-${{ env.VERSION }}.zip" \
            "CleanLauncher-Windows-MSVC-Portable-${{ env.VERSION }}.zip" \
            "CleanLauncher-Windows-MSVC-Setup-${{ env.VERSION }}.exe" \
            "CleanLauncher-Windows-MSVC-arm64-${{ env.VERSION }}.zip" \
            "CleanLauncher-Windows-MSVC-arm64-Portable-${{ env.VERSION }}.zip" \
            "CleanLauncher-Windows-MSVC-arm64-Setup-${{ env.VERSION }}.exe" \
            "CleanLauncher-macOS-${{ env.VERSION }}.zip" \
            "CleanLauncher-macOS-${{ env.VERSION }}.dmg" \
            "CleanLauncher-${{ env.VERSION }}.tar.gz"
