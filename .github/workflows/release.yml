name: Build Application and Make Release

on:
  push:
    tags:
      - "*"

permissions: {}

jobs:
  build_release:
    name: Build Release
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
    with:
      build-type: Release
    secrets: inherit

  create_release:
    needs: build_release
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: "true"
          path: "Launcher-source"

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Grab and store version
        run: |
          tag_name=$(echo ${{ github.ref }} | grep -oE "[^/]+$")
          echo "VERSION=$tag_name" >> $GITHUB_ENV

      - name: Package artifacts properly
        run: |
          mv ${{ github.workspace }}/Launcher-source Launcher-${{ env.VERSION }}
          mv Launcher-Linux-Qt6-Portable*/Launcher-portable.tar.gz Launcher-Linux-Qt6-Portable-${{ env.VERSION }}.tar.gz
          mv Launcher-Linux-aarch64-Qt6-Portable*/Launcher-portable.tar.gz Launcher-Linux-aarch64-Qt6-Portable-${{ env.VERSION }}.tar.gz
          mv Launcher-*.AppImage/Launcher-*-x86_64.AppImage Launcher-Linux-x86_64.AppImage
          mv Launcher-*.AppImage.zsync/Launcher-*-x86_64.AppImage.zsync Launcher-Linux-x86_64.AppImage.zsync
          mv Launcher-*.AppImage/Launcher-*-aarch64.AppImage Launcher-Linux-aarch64.AppImage
          mv Launcher-*.AppImage.zsync/Launcher-*-aarch64.AppImage.zsync Launcher-Linux-aarch64.AppImage.zsync
          mv Launcher-macOS*/Launcher.zip Launcher-macOS-${{ env.VERSION }}.zip
          mv Launcher-macOS*/Launcher.dmg Launcher-macOS-${{ env.VERSION }}.dmg

          tar --exclude='.git' -czf Launcher-${{ env.VERSION }}.tar.gz Launcher-${{ env.VERSION }}

          for d in Launcher-Windows-MinGW-w64*; do
            cd "${d}" || continue
            INST="$(echo -n ${d} | grep -o Setup || true)"
            PORT="$(echo -n ${d} | grep -o Portable || true)"
            NAME="Launcher-Windows-MinGW-w64"
            test -z "${PORT}" || NAME="${NAME}-Portable"
            test -z "${INST}" || mv Launcher-*.exe ../${NAME}-Setup-${{ env.VERSION }}.exe
            test -n "${INST}" || zip -r -9 "../${NAME}-${{ env.VERSION }}.zip" *
            cd ..
          done

          for d in Launcher-Windows-MinGW-arm64*; do
            cd "${d}" || continue
            INST="$(echo -n ${d} | grep -o Setup || true)"
            PORT="$(echo -n ${d} | grep -o Portable || true)"
            NAME="Launcher-Windows-MinGW-arm64"
            test -z "${PORT}" || NAME="${NAME}-Portable"
            test -z "${INST}" || mv Launcher-*.exe ../${NAME}-Setup-${{ env.VERSION }}.exe
            test -n "${INST}" || zip -r -9 "../${NAME}-${{ env.VERSION }}.zip" *
            cd ..
          done

      - name: Create release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Launcher ${{ env.VERSION }}" \
            --draft \
            --generate-notes \
            Launcher-Linux-x86_64.AppImage \
            Launcher-Linux-x86_64.AppImage.zsync \
            Launcher-Linux-aarch64.AppImage \
            Launcher-Linux-aarch64.AppImage.zsync \
            "Launcher-Linux-Qt6-Portable-${{ env.VERSION }}.tar.gz" \
            "Launcher-Linux-aarch64-Qt6-Portable-${{ env.VERSION }}.tar.gz" \
            "Launcher-Windows-MinGW-w64-${{ env.VERSION }}.zip" \
            "Launcher-Windows-MinGW-w64-Portable-${{ env.VERSION }}.zip" \
            "Launcher-Windows-MinGW-w64-Setup-${{ env.VERSION }}.exe" \
            "Launcher-Windows-MinGW-arm64-${{ env.VERSION }}.zip" \
            "Launcher-Windows-MinGW-arm64-Portable-${{ env.VERSION }}.zip" \
            "Launcher-Windows-MinGW-arm64-Setup-${{ env.VERSION }}.exe" \
            "Launcher-macOS-${{ env.VERSION }}.zip" \
            "Launcher-macOS-${{ env.VERSION }}.dmg" \
            "Launcher-${{ env.VERSION }}.tar.gz"
