name: Build Application and Make Release

on:
  push:
    tags:
      - "*"

permissions: {}

jobs:
  build_release:
    name: Build Release
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
    with:
      build-type: Release
    secrets: inherit

  build_snap:
    name: Build Snap
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install Snapcraft
        run: |
          sudo snap install snapcraft --classic
      - name: Build Snap
        run: |
          sudo snapcraft --destructive-mode
      - uses: actions/upload-artifact@v7
        with:
          name: snap
          path: "*.snap"

  build_flatpak:
    name: Build Flatpak
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install Flatpak Builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Build Flatpak
        run: |
          flatpak-builder --user --disable-rofiles-fuse --install-deps-from=flathub --force-clean build-dir flatpak/com.cleanlauncher.Launcher.yml
          flatpak build-bundle build-dir Launcher.flatpak com.cleanlauncher.Launcher
      - uses: actions/upload-artifact@v7
        with:
          name: flatpak
          path: Launcher.flatpak

  create_release:
    needs: [build_release, build_snap, build_flatpak]
    if: always()
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: "true"
          path: "Launcher-source"

      - name: Configure git user
        run: |
          git config --global user.name "Alessio Attilio"
          git config --global user.email "attilio.alessio@protonmail.com"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Grab version
        run: |
          tag_name=$(echo ${{ github.ref }} | grep -oE "[^/]+$")
          echo "VERSION=$tag_name" >> $GITHUB_ENV

      - name: Collect all release files
        run: |
          RELEASE_DIR="release-files"
          mkdir -p "$RELEASE_DIR"
          VERSION="${{ env.VERSION }}"

          echo "Collecting artifacts from: artifacts/"
          find artifacts/ -type f 2>/dev/null | head -50

          # Linux AppImage (x86_64 and aarch64)
          find artifacts/ -name "*.AppImage" -not -name "*.zsync" -exec cp {} "$RELEASE_DIR/" \;
          find artifacts/ -name "*.AppImage.zsync" -exec cp {} "$RELEASE_DIR/" \;

          # Linux Portable tarballs
          find artifacts/ -name "*.tar.gz" -path "*/Portable*" -exec sh -c 'cp "$1" "'"$RELEASE_DIR"'/Launcher-Linux-Portable-'"$VERSION"'.tar.gz"' _ {} \; 2>/dev/null || true

          # .deb packages
          find artifacts/ -name "*.deb" -exec cp {} "$RELEASE_DIR/" \;

          # .rpm packages
          find artifacts/ -name "*.rpm" -exec cp {} "$RELEASE_DIR/" \;

          # Snap
          find artifacts/ -name "*.snap" -exec cp {} "$RELEASE_DIR/" \;

          # Flatpak
          find artifacts/ -name "*.flatpak" -exec cp {} "$RELEASE_DIR/" \;

          # macOS
          find artifacts/ -name "*.dmg" -exec cp {} "$RELEASE_DIR/" \;
          find artifacts/ -name "*.zip" -path "*/macOS*" -exec sh -c 'cp "$1" "'"$RELEASE_DIR"'/Launcher-macOS-'"$VERSION"'.zip"' _ {} \; 2>/dev/null || true

          # Windows installers
          find artifacts/ -name "Launcher-Setup.exe" -exec sh -c '
            dir=$(dirname "$1")
            dirname=$(basename "$dir")
            if echo "$dirname" | grep -q "MinGW-w64"; then
              cp "$1" "'"$RELEASE_DIR"'/Launcher-Windows-MinGW-w64-Setup-'"$VERSION"'.exe"
            elif echo "$dirname" | grep -q "arm64"; then
              cp "$1" "'"$RELEASE_DIR"'/Launcher-Windows-MinGW-arm64-Setup-'"$VERSION"'.exe"
            else
              cp "$1" "'"$RELEASE_DIR"'/Launcher-Windows-Setup-'"$VERSION"'.exe"
            fi
          ' _ {} \;

          # Source tarball
          cd "${{ github.workspace }}"
          tar --exclude='.git' -czf "$RELEASE_DIR/Launcher-$VERSION.tar.gz" Launcher-source

          # Nix and metadata
          cp Launcher-source/nix/launcher.nix "$RELEASE_DIR/" 2>/dev/null || true
          tar --exclude='.git' -czf "$RELEASE_DIR/Launcher-$VERSION-nix-config.tar.gz" -C Launcher-source nix/ 2>/dev/null || true
          tar --exclude='.git' -czf "$RELEASE_DIR/Launcher-$VERSION-res.tar.gz" -C Launcher-source res/ 2>/dev/null || true
          cp Launcher-source/flatpak/com.cleanlauncher.Launcher.yml "$RELEASE_DIR/" 2>/dev/null || true
          cp Launcher-source/snap/snapcraft.yaml "$RELEASE_DIR/" 2>/dev/null || true

          echo "Final release files:"
          ls -la "$RELEASE_DIR/"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_DIR="release-files"
          VERSION="${{ env.VERSION }}"
          CHANGELOG_FILE="Launcher-source/.changelog/${VERSION}.md"
          ASSETS=""

          for f in "$RELEASE_DIR"/*; do
            test -f "$f" && ASSETS="$ASSETS $f"
          done

          if [ -z "$ASSETS" ]; then
            echo "::warning::No release assets found, creating release without binaries"
          fi

          if gh release view "$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $VERSION already exists, deleting to recreate."
            gh release delete "$VERSION" --repo "${{ github.repository }}" --yes
          fi

          NOTES=""
          if [ -f "$CHANGELOG_FILE" ]; then
            NOTES=$(cat "$CHANGELOG_FILE")
            echo "Using changelog from $CHANGELOG_FILE"
          else
            NOTES=$(gh release view "$VERSION" --repo "${{ github.repository }}" --json body --jq '.body' 2>/dev/null || echo "")
            if [ -z "$NOTES" ]; then
              NOTES="## What's Changed

See the [changelog](https://github.com/${{ github.repository }}/blob/master/.changelog/${VERSION}.md) for details."
            fi
          fi

          gh release create "$VERSION" \
            --repo "${{ github.repository }}" \
            --title "Launcher $VERSION" \
            --notes "$NOTES" \
            $ASSETS
