name: Build Application and Make Release

on:
  push:
    tags:
      - "*"

permissions: {}

jobs:
  build_release:
    name: Build Release
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
    with:
      build-type: Release
    secrets: inherit

  build_nix:
    name: Build Nix
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-24.05

      - name: Build nix package
        run: |
          nix-build nix/launcher.nix -o result-nix 2>&1 || true
          if [ -d result-nix/bin ]; then
            cp result-nix/bin/launcher Launcher-nix
            chmod +x Launcher-nix
          else
            echo "Nix build failed, creating placeholder"
            echo "#!/bin/sh" > Launcher-nix
            echo "echo 'Nix build not available for this platform'" >> Launcher-nix
            chmod +x Launcher-nix
          fi

      - name: Upload nix binary
        uses: actions/upload-artifact@v7
        with:
          name: Launcher-nix
          path: Launcher-nix

  create_release:
    needs: [build_release, build_nix]
    if: always() && needs.build_release.result == 'success'
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: "true"
          path: "Launcher-source"

      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Grab version
        run: |
          tag_name=$(echo ${{ github.ref }} | grep -oE "[^/]+$")
          echo "VERSION=$tag_name" >> $GITHUB_ENV

      - name: Package artifacts
        run: |
          mv ${{ github.workspace }}/Launcher-source Launcher-${{ env.VERSION }}

          # Linux
          mv Launcher-Linux-Qt6-Portable*/Launcher-portable.tar.gz Launcher-Linux-Qt6-Portable-${{ env.VERSION }}.tar.gz 2>/dev/null || true
          mv Launcher-Linux-aarch64-Qt6-Portable*/Launcher-portable.tar.gz Launcher-Linux-aarch64-Qt6-Portable-${{ env.VERSION }}.tar.gz 2>/dev/null || true
          mv Launcher-*.AppImage/Launcher-*-x86_64.AppImage Launcher-Linux-x86_64.AppImage 2>/dev/null || true
          mv Launcher-*.AppImage.zsync/Launcher-*-x86_64.AppImage.zsync Launcher-Linux-x86_64.AppImage.zsync 2>/dev/null || true
          mv Launcher-*.AppImage/Launcher-*-aarch64.AppImage Launcher-Linux-aarch64.AppImage 2>/dev/null || true
          mv Launcher-*.AppImage.zsync/Launcher-*-aarch64.AppImage.zsync Launcher-Linux-aarch64.AppImage.zsync 2>/dev/null || true

          # .deb and .rpm
          while IFS= read -r f; do
            cp "$f" "Launcher-${{ env.VERSION }}.deb"
          done < <(find . -name '*.deb' -type f 2>/dev/null)
          while IFS= read -r f; do
            cp "$f" "Launcher-${{ env.VERSION }}.rpm"
          done < <(find . -name '*.rpm' -type f 2>/dev/null)

          # .nix
          while IFS= read -r f; do
            cp "$f" "Launcher-${{ env.VERSION }}.nix"
          done < <(find . -name 'Launcher-nix' -type f 2>/dev/null)

          # macOS
          mv Launcher-macOS*/Launcher.zip Launcher-macOS-${{ env.VERSION }}.zip 2>/dev/null || true
          mv Launcher-macOS*/Launcher.dmg Launcher-macOS-${{ env.VERSION }}.dmg 2>/dev/null || true

          # Windows
          for d in Launcher-Windows-MinGW-w64*; do
            cd "${d}" || continue
            test -f Launcher-*.exe && mv Launcher-*.exe ../Launcher-Windows-MinGW-w64-Setup-${{ env.VERSION }}.exe 2>/dev/null || true
            cd ..
          done

          for d in Launcher-Windows-MinGW-arm64*; do
            cd "${d}" || continue
            test -f Launcher-*.exe && mv Launcher-*.exe ../Launcher-Windows-MinGW-arm64-Setup-${{ env.VERSION }}.exe 2>/dev/null || true
            cd ..
          done

          # Source tarball
          tar --exclude='.git' -czf Launcher-${{ env.VERSION }}.tar.gz Launcher-${{ env.VERSION }}

          # Metadata folders and manifests
          cd "Launcher-${{ env.VERSION }}"
          tar --exclude='.git' -czf ../Launcher-${{ env.VERSION }}-nix-config.tar.gz nix/
          tar --exclude='.git' -czf ../Launcher-${{ env.VERSION }}-res.tar.gz res/
          cp flatpak/com.cleanlauncher.Launcher.yml ../com.cleanlauncher.Launcher.yml 2>/dev/null || true
          cp snap/snapcraft.yaml ../snapcraft.yaml 2>/dev/null || true
          cd ..

      - name: Create release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS=""
          for f in \
            "Launcher-Linux-x86_64.AppImage" \
            "Launcher-Linux-x86_64.AppImage.zsync" \
            "Launcher-Linux-aarch64.AppImage" \
            "Launcher-Linux-aarch64.AppImage.zsync" \
            "Launcher-Linux-Qt6-Portable-${{ env.VERSION }}.tar.gz" \
            "Launcher-Linux-aarch64-Qt6-Portable-${{ env.VERSION }}.tar.gz" \
            "Launcher-${{ env.VERSION }}.deb" \
            "Launcher-${{ env.VERSION }}.rpm" \
            "Launcher-${{ env.VERSION }}.nix" \
            "com.cleanlauncher.Launcher.yml" \
            "snapcraft.yaml" \
            "Launcher-Windows-MinGW-w64-Setup-${{ env.VERSION }}.exe" \
            "Launcher-Windows-MinGW-arm64-Setup-${{ env.VERSION }}.exe" \
            "Launcher-macOS-${{ env.VERSION }}.zip" \
            "Launcher-macOS-${{ env.VERSION }}.dmg" \
            "Launcher-${{ env.VERSION }}.tar.gz" \
            "Launcher-${{ env.VERSION }}-nix-config.tar.gz" \
            "Launcher-${{ env.VERSION }}-res.tar.gz"
          do
            test -f "$f" && ASSETS="$ASSETS $f"
          done

          # Top-level dotfiles
          for f in .*; do
            test -f "$f" && ASSETS="$ASSETS $f"
          done

          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists, deleting to recreate."
            gh release delete "${{ github.ref_name }}" --repo "${{ github.repository }}" --yes
          fi

          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Launcher ${{ env.VERSION }}" \
            --generate-notes \
            $ASSETS
