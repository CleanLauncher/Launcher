name: Development Container

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  merge_group:
    types: [checks_requested]
  pull_request:
  workflow_dispatch:

permissions: {}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build (${{ matrix.arch }})

    permissions:
      contents: read
      packages: write

    outputs:
      image-name: ${{ steps.image-name.outputs.image-name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: ubuntu-24.04-arm
          - arch: amd64
            os: ubuntu-24.04

    runs-on: ${{ matrix.os }}

    steps:
      - name: Set image name
        id: image-name
        run: |
          echo "image-name=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/devcontainer" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute tags
        id: compute-tags
        run: |
          IMAGE_NAME="${{ steps.image-name.outputs.image-name }}"
          TAGS=""

          if [ "${{ github.event_name }}" = "merge_group" ] && [ "${{ github.event.merge_group.base_ref }}" = "refs/heads/develop" ]; then
            TAGS="${IMAGE_NAME}:latest"
          fi

          TAGS="${TAGS:+${TAGS},}${IMAGE_NAME}:sha-${GITHUB_SHA::7}"
          TAGS="${TAGS:+${TAGS},}${IMAGE_NAME}:sha-${GITHUB_SHA}"
          TAGS="${TAGS:+${TAGS},}${IMAGE_NAME}:branch-${GITHUB_REF_NAME}"

          if [ -n "${GITHUB_REF_NAME}" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS:+${TAGS},}${IMAGE_NAME}:tag-${GITHUB_REF_NAME}"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build image
        id: build-image
        run: |
          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.compute-tags.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            TAGS="$TAGS --tag $tag"
          done

          podman build \
            --file ./Containerfile \
            --arch "${{ matrix.arch }}" \
            $TAGS \
            .

          DIGEST=$(podman inspect --format '{{index .RepoDigests 0}}' "${TAG_ARRAY[0]}" | cut -d@ -f2)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Push image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "$GH_TOKEN" | podman login "$REGISTRY" -u "${{ github.repository_owner }}" --password-stdin
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.compute-tags.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            podman push "$tag" --tls-verify=true
          done

      - name: Export image digest
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          mkdir -p "$RUNNER_TEMP"/digests
          touch "$RUNNER_TEMP"/digests/"${{ steps.build-image.outputs.digest }}"

      - name: Upload digest artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Create manifest

    needs: [ build ]
    if: ${{ github.event_name != 'pull_request' }}

    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-24.04

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Compute tags
        id: compute-tags
        run: |
          IMAGE_NAME="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/devcontainer"
          TAGS=""

          if [ "${{ github.event_name }}" = "merge_group" ] && [ "${{ github.event.merge_group.base_ref }}" = "refs/heads/develop" ]; then
            TAGS="${IMAGE_NAME}:latest"
          fi

          TAGS="${TAGS:+${TAGS},}${IMAGE_NAME}:sha-${GITHUB_SHA::7}"
          TAGS="${TAGS:+${TAGS},}${IMAGE_NAME}:sha-${GITHUB_SHA}"
          TAGS="${TAGS:+${TAGS},}${IMAGE_NAME}:branch-${GITHUB_REF_NAME}"

          if [ -n "${GITHUB_REF_NAME}" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS:+${TAGS},}${IMAGE_NAME}:tag-${GITHUB_REF_NAME}"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Login to registry
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "$GH_TOKEN" | podman login "$REGISTRY" -u "${{ github.repository_owner }}" --password-stdin

      - name: Create manifest list
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAME: ${{ needs.build.outputs.image-name }}
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.compute-tags.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            podman manifest create "$tag" \
              $(printf "$IMAGE_NAME@sha256:%s " *)
            podman manifest push "$tag" --tls-verify=true
          done
