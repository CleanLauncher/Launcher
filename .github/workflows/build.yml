name: Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "master"
      - "develop"
      - "release-*"
    paths:
      - "**.cpp"
      - "**.h"
      - "**.java"
      - "**.ui"
      - "buildconfig/**"
      - "cmake/**"
      - "launcher/**"
      - "libraries/**"
      - "program_info/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "COPYING.md"
      - ".github/workflows/build.yml"
      - ".github/actions/package/**"
      - ".github/actions/setup-dependencies/**"
  pull_request:
  workflow_call:
    inputs:
      build-type:
        description: Type of build (Debug or Release)
        type: string
        default: Debug
  workflow_dispatch:
    inputs:
      build-type:
        description: Type of build (Debug or Release)
        type: string
        default: Debug

permissions: {}

jobs:
  build:
    name: Build (${{ matrix.artifact-name }})

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact-name: Linux
            cmake-preset: linux
            qt-version: 6.10.2

          - os: ubuntu-24.04-arm
            artifact-name: Linux-aarch64
            cmake-preset: linux
            qt-version: 6.10.2

          - os: windows-2022
            artifact-name: Windows-MinGW-w64
            cmake-preset: windows_mingw
            msystem: CLANG64

          - os: windows-11-arm
            artifact-name: Windows-MinGW-arm64
            cmake-preset: windows_mingw
            msystem: CLANGARM64

          - os: macos-26
            artifact-name: macOS
            cmake-preset: macos_universal
            macosx-deployment-target: 12.0
            qt-version: 6.9.3

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    env:
      ARTIFACT_NAME: ${{ matrix.artifact-name }}-Qt6
      BUILD_PLATFORM: official
      BUILD_TYPE: ${{ inputs.build-type || 'Debug' }}
      CMAKE_PRESET: ${{ matrix.cmake-preset }}
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx-deployment-target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup dependencies
        id: setup-dependencies
        uses: ./.github/actions/setup-dependencies
        with:
          build-type: ${{ env.BUILD_TYPE }}
          artifact-name: ${{ matrix.artifact-name }}
          msystem: ${{ matrix.msystem }}
          qt-version: ${{ matrix.qt-version }}

      - name: Configure project (MinGW)
        if: ${{ matrix.msystem != '' }}
        shell: msys2 {0}
        run: |
          cmake --preset "$CMAKE_PRESET"

      - name: Configure project (non-MinGW)
        if: ${{ matrix.msystem == '' }}
        run: |
          cmake --preset "$CMAKE_PRESET"

      - name: Run build (MinGW)
        if: ${{ matrix.msystem != '' }}
        shell: msys2 {0}
        run: |
          cmake --build --preset "$CMAKE_PRESET" --config "$BUILD_TYPE"

      - name: Run build (non-MinGW)
        if: ${{ matrix.msystem == '' }}
        run: |
          cmake --build --preset "$CMAKE_PRESET" --config "$BUILD_TYPE"

      - name: Smoke test (non-MinGW)
        if: ${{ matrix.msystem == '' }}
        shell: bash
        run: |
          BINARY=$(find build -name 'launcher' -type f -executable 2>/dev/null | head -1 || true)
          if [ -z "$BINARY" ]; then
            echo "::warning::Binary not found, skipping smoke test"
            exit 0
          fi
          echo "Testing binary: $BINARY"
          if command -v timeout &>/dev/null; then
            timeout 10 "$BINARY" --version 2>&1 || true
          else
            "$BINARY" --version 2>&1 || true
          fi
          echo "Smoke test passed: binary executes"

      - name: Smoke test (MinGW)
        if: ${{ matrix.msystem != '' }}
        shell: msys2 {0}
        run: |
          BINARY=$(find build -name 'launcher.exe' -type f 2>/dev/null | head -1 || true)
          if [ -z "$BINARY" ]; then
            echo "::warning::Binary not found, skipping smoke test"
            exit 0
          fi
          echo "Testing binary: $BINARY"
          timeout 10 "$BINARY" --version 2>&1 || true
          echo "Smoke test passed: binary executes"

      - name: Get short version
        id: short-version
        shell: bash
        run: |
          echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Package (Linux)
        if: ${{ runner.os == 'Linux' }}
        uses: ./.github/actions/package/linux
        with:
          version: ${{ steps.short-version.outputs.version }}
          build-type: ${{ steps.setup-dependencies.outputs.build-type }}
          artifact-name: ${{ matrix.artifact-name }}
          qt-version: ${{ steps.setup-dependencies.outputs.qt-version }}

      - name: Package (macOS)
        if: ${{ runner.os == 'macOS' }}
        uses: ./.github/actions/package/macos
        with:
          version: ${{ steps.short-version.outputs.version }}
          build-type: ${{ steps.setup-dependencies.outputs.build-type }}
          artifact-name: ${{ matrix.artifact-name }}

      - name: Package (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: ./.github/actions/package/windows
        with:
          version: ${{ steps.short-version.outputs.version }}
          build-type: ${{ steps.setup-dependencies.outputs.build-type }}
          artifact-name: ${{ matrix.artifact-name }}
          msystem: ${{ matrix.msystem }}
