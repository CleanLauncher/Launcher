name: Lint

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "master"
      - "develop"
      - "release-*"
  pull_request:

permissions: {}

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install clang-format
        run: |
          pip install --break-system-packages clang-format==18.1.8

      - name: Run clang-format
        run: |
          find . -name '*.cpp' -o -name '*.h' -o -name '*.hpp' | grep -v './libraries/' | grep -v './build/' | xargs clang-format --dry-run --style=file -Werror

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install markdownlint
        run: |
          npm install -g markdownlint-cli

      - name: Run markdownlint
        run: |
          markdownlint --dot .

  nix-fmt:
    name: nix format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Run nix fmt
        run: |
          nix fmt -- --check .

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --suppressions-list=.cppcheck-suppressions \
            --inline-suppr \
            -I libraries/ \
            -I launcher/ \
            launcher/ libraries/
