name: Nix

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - "master"
      - "develop"
      - "release-*"
    tags:
      - "*"
    paths:
      - "**.cpp"
      - "**.h"
      - "**.java"
      - "**.ui"
      - "**.md"
      - "**.nix"
      - "nix/**"
      - "flake.lock"
      - "buildconfig/**"
      - "cmake/**"
      - "launcher/**"
      - "libraries/**"
      - "program_info/**"
      - "tests/**"
      - "CMakeLists.txt"
      - ".github/workflows/nix.yml"
  pull_request:
    paths:
      - "**.cpp"
      - "**.h"
      - "**.java"
      - "**.ui"
      - "**.md"
      - "**.nix"
      - "nix/**"
      - "flake.lock"
      - "buildconfig/**"
      - "cmake/**"
      - "launcher/**"
      - "libraries/**"
      - "program_info/**"
      - "tests/**"
      - "CMakeLists.txt"
      - ".github/workflows/nix.yml"
  workflow_dispatch:

permissions: {}

env:
  DEBUG: ${{ github.ref_type != 'tag' }}

jobs:
  build:
    name: Build (${{ matrix.system }})

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            system: x86_64-linux

          - os: ubuntu-22.04-arm
            system: aarch64-linux

          - os: macos-26
            system: aarch64-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Run Flake checks
        run: |
          nix flake check --print-build-logs --show-trace

      - name: Build debug package
        if: ${{ env.DEBUG == 'true' }}
        run: |
          nix build \
            --no-link --print-build-logs --print-out-paths \
            .#launcher-debug >> "$GITHUB_STEP_SUMMARY"

      - name: Build release package
        if: ${{ env.DEBUG == 'false' }}
        run: |
          nix build --no-link --print-out-paths .#launcher \
            | tee -a "$GITHUB_STEP_SUMMARY"
